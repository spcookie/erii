services:
  erii:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erii
    restart: always
    environment:
      - JAVA_OPTS=-XX:+UseZGC -Xms256m -Xmx256m -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai
    env_file:
      - .env.local
    volumes:
      - ./store:/erii/store
    ports:
      - "8080:8080"
      - "8082:8082"
      - "8000:8000"

