services:
  erii:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erii-server
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    environment:
      - JAVA_OPTS=-XX:+UseG1GC -Xms256m -Xmx256m -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/erii/oom_heap.hprof -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai --add-opens java.base/java.lang=ALL-UNNAMED
      - ERII_CORE_OPTS=-Dpf4j.pluginsDir=./plugins -Dconfig.plugin.dir=./conf/plugin-config -Dconfig.path=./conf/application.conf -Dconfig.souls.dir=./conf/souls -Dconfig.rules.dir=./conf/rules
    env_file:
      - ./conf/.env.local
    volumes:
      - ./conf:/erii/conf
      - ./store:/erii/store
      - ./plugins:/erii/plugins
      - ./.conf:/erii/.conf
    extra_hosts:
      - "hostmachine:host-gateway"
    ports:
      - "8080:8080"
      - "8082:8082"
      - "8000:8000"