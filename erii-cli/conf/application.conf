# LLM 配置
llm {
  choice-provider = "none"
  capability {
    completion = true
    prompt-caching = true
    temperature = true
    tools = true
    tool-choice = true
    multiple-choices = true
    thinking = true
    vision-image = true

    lite {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = false
      vision-image = false
    }
    flash {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
    pro {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
  }

  providers {
    google {
      api-key = ${?GOOGLE_API_KEY}
      base-url = "https://generativelanguage.googleapis.com"
      models {
        lite = "gemini-2.0-flash-lite"
        flash = "gemini-2.0-flash"
        pro = "gemini-2.5-pro"
      }
    }
    deep-seek {
      api-key = ${?DEEP_SEEK_API_KEY}
      base-url = "https://api.deepseek.com"
      models {
        lite = "deepseek-chat"
        flash = "deepseek-chat"
        pro = "deepseek-chat"
      }
    }
    minimax {
      api-key = ${?MINIMAX_API_KEY}
      base-url = "https://api.minimaxi.com"
      models {
        lite = "MiniMax-M2.5"
        flash = "MiniMax-M2.5"
        pro = "MiniMax-M2.7"
      }
    }
    openai {
      api-key = ${?OPENAI_API_KEY}
      base-url = "https://api.openai.com/v1"
      models {
        lite = "gpt-4.1-nano"
        flash = "gpt-4.1-mini"
        pro = "gpt-4.1"
      }
    }
    anthropic {
      api-key = ${?ANTHROPIC_API_KEY}
      base-url = "https://api.anthropic.com"
      models {
        lite = "claude-haiku-4-5-20251001"
        flash = "claude-sonnet-4-6"
        pro = "claude-sonnet-4-6"
      }
    }
    openrouter {
      api-key = ${?OPENROUTER_API_KEY}
      base-url = "https://openrouter.ai/api"
      models {
        lite = "openai/gpt-4.1-nano"
        flash = "openai/gpt-4.1-mini"
        pro = "anthropic/claude-sonnet-4-6"
      }
    }
  }
}

# Embedding 配置
embedding {
  api-key = ${?EMBEDDING_API_KEY}
  url = "https://ark.cn-beijing.volces.com/api/v3/embeddings/multimodal"
  provider = "bytedance"
  model = "doubao-embedding-vision-250615"
}

# Search 配置
search {
  api-key = ${?SEARCH_API_KEY}
  url = "https://api.exa.ai/search"
  provider = "exa"
}

# Vision 配置
vision {
  api-key = ${?VISION_API_KEY}
  url = "https://api.minimaxi.com/v1/coding_plan/vlm"
  provider = "minimax"
}

# Browser 相关配置
browser {
  download = false
  playwright-url = ${?PLAYWRIGHT_HOST}
  external-host = ${?EXTERNAL_HOST}
}

# 代理配置
proxy {
  http = ${?HTTP_PROXY}
  socks = ${?SOCKS_PROXY}
}

# OneBot QQ Bot 配置
onebot {
  bots = {
    erii = {
      ws = "ws://127.0.0.1:3001"  # NapCat WebSocket 地址
      token = ${NAPCAT_TOKEN}
      role-id = "erii"      # 对应的角色 ID（在 BotRoleManager 中配置）
      groups = {
        123456789 = {              # 群组 ID
          admins = []              # 群管理员列表
          desire = 15
        }
      }
      # 可选：按机器人维度覆盖全局 groups 配置
      # 未指定的字段回退到全局 groups 配置；message-redirect-map 与全局合并，本机器人配置优先
      groups-override = {
        enable-groups = null                 # 覆盖：此机器人仅响应这些群
        debug-group-id = null                # 覆盖：此机器人的调试群（null 则用全局）
        message-redirect-map = {}            # 合并：与全局 map 合并，本级优先
      }
      # 可选：插件白名单/黑名单（白名单优先）
      enabled-plugins = []     # 仅启用这些插件（其余插件禁用）
      disabled-plugins = []      # 禁用这些插件（其余插件启用）
    }
  }
}

# 群组配置
groups {
  debug-group-id = null                    # 调试群组（可选，设为 null 则不启用）
  enable-groups = []                       # 启用的群组列表
  message-redirect-map = []                # 消息重定向映射，格式：sourceGroup:targetGroup
}
