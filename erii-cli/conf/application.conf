# LLM 配置
llm {
  choice-provider = "none"
  capability {
    completion = true
    prompt-caching = true
    temperature = true
    tools = true
    tool-choice = true
    multiple-choices = true
    thinking = true
    vision-image = true

    lite {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = false
      vision-image = false
    }
    flash {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
    pro {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
  }

  param {
    lite {
    }
    flash {
    }
    pro {
    }
  }

  providers {
    google {
      api-key = ${?GOOGLE_API_KEY}
      base-url = "https://generativelanguage.googleapis.com"
      models {
        lite = "gemini-2.0-flash-lite"
        flash = "gemini-2.0-flash"
        pro = "gemini-2.5-pro"
      }
    }
    openai {
      api-key = ${?OPENAI_API_KEY}
      base-url = "https://api.openai.com/v1"
      models {
        lite = "gpt-4.1-nano"
        flash = "gpt-4.1-mini"
        pro = "gpt-4.1"
      }
    }
    anthropic {
      api-key = ${?ANTHROPIC_API_KEY}
      base-url = "https://api.anthropic.com"
      models {
        lite = "claude-haiku-4-5-20251001"
        flash = "claude-sonnet-4-6"
        pro = "claude-sonnet-4-6"
      }
    }
    openrouter {
      api-key = ${?OPENROUTER_API_KEY}
      base-url = "https://openrouter.ai/api"
      models {
        lite = "openai/gpt-4.1-nano"
        flash = "openai/gpt-4.1-mini"
        pro = "anthropic/claude-sonnet-4-6"
      }
    }
  }
}

# State tuning
state-tuning {
  emotion {
    emotion-retention-high = 0.85
    emotion-retention-medium = 0.7
    emotion-retention-low = 0.5
    mood-retention = 0.92
    mood-emotion-influence = 0.5
    emotion-half-life-seconds = 600
    mood-half-life-seconds = 3600
  }

  flow {
    min-ratio-of-desire = 0.3
    min-value-min = 1.0
    min-value-max = 20.0
    decay-normal-per-minute = 0.3
    decay-negative-per-minute = 1.5
    core-interest-base-charge = 20.0
    continuous-interaction-base-charge = 10.0
    deep-reply-base-charge = 5.0
    group-resonance-base-charge = 10.0
    negative-penalty = 40.0
    topic-interrupt-penalty = 30.0
    repeat-topic-penalty = 10.0
    low-activity-penalty = 5.0
    getting-better-threshold = 30.0
    burst-threshold = 70.0
  }

  volition {
    base-desire-default = 15.0
    keyword-hit-max-stimulus = 30.0
    busy-group-stimulus = 10.0
    indirect-mention-stimulus = 25.0
    emotional-resonance-stimulus = 15.0
    reset-stimulus-amount = 15.0
    fatigue-on-speak = 40.0
    fatigue-decay-low-arousal = 2.0
    fatigue-decay-normal = 1.0
    stimulus-decay-normal = 3.0
    stimulus-decay-high-flow = 1.0
    normal-speak-threshold = 65.0
    high-flow-speak-threshold = 50.0
    high-flow-threshold = 70.0
    arousal-impulse-weight = 30.0
    negative-pleasure-penalty-weight = 20.0
    flow-bonus-start = 70.0
    flow-bonus-weight = 1.0
  }

  memory {
    batch-limit = 400
    min-messages = 30
    stale-recall-days = 90
  }

  summary {
    batch-limit = 200
    min-messages = 30
    retention-days = 7
  }

  meme {
    analyze-threshold = 3
    max-contexts = 400
    cleanup-days = 7
    low-heat-seen-threshold = 3
  }

  evolution {
    default-weight = 50
    active-weight-threshold = 50
    min-weight-threshold = 20
    increase-on-use = 10
    decay-per-cycle = 10
    decrease-on-negative = 50
    stale-days = 3
    recent-range-hours = 1
    recent-message-limit = 500
    active-limit = 10
  }
}

# Embedding 配置
embedding {
  api-key = ${?EMBEDDING_API_KEY}
  url = "https://ark.cn-beijing.volces.com/api/v3/embeddings/multimodal"
  provider = "bytedance"
  model = "doubao-embedding-vision-250615"
}

# Search 配置
search {
  api-key = ${?SEARCH_API_KEY}
  url = "https://api.exa.ai/search"
  provider = "exa"
}

# Vision 配置
vision {
  api-key = ${?VISION_API_KEY}
  url = "https://api.minimaxi.com/v1/coding_plan/vlm"
  provider = "minimax"
}

# Browser 相关配置
browser {
  download = false
  playwright-url = ${?PLAYWRIGHT_HOST}
  external-host = ${?EXTERNAL_HOST}
}

# 代理配置
proxy {
  http = ${?HTTP_PROXY}
  socks = ${?SOCKS_PROXY}
}

# OneBot QQ Bot 配置
onebot {
  bots = {
    erii = {
      ws = "ws://127.0.0.1:3001"  # NapCat WebSocket 地址
      token = ${NAPCAT_TOKEN}
      role-id = "erii"      # 对应的角色 ID（在 BotRoleManager 中配置）
      groups = {
        123456789 = {              # 群组 ID
          admins = []              # 群管理员列表
          desire = 15
        }
      }
      # 可选：按机器人维度覆盖全局 groups 配置
      # 未指定的字段回退到全局 groups 配置；message-redirect-map 与全局合并，本机器人配置优先
      groups-override = {
        enable-groups = null                 # 覆盖：此机器人仅响应这些群
        debug-group-id = null                # 覆盖：此机器人的调试群（null 则用全局）
        message-redirect-map = {}            # 合并：与全局 map 合并，本级优先
      }
      # 可选：插件白名单/黑名单（白名单优先）
      enabled-plugins = []     # 仅启用这些插件（其余插件禁用）
      disabled-plugins = []      # 禁用这些插件（其余插件启用）
    }
  }
}

# 群组配置
groups {
  debug-group-id = null                    # 调试群组（可选，设为 null 则不启用）
  enable-groups = []                       # 启用的群组列表
  message-redirect-map = []                # 消息重定向映射，格式：sourceGroup:targetGroup
}
