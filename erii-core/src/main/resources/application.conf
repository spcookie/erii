# LLM 配置
llm {
  choice-model = ${?CHOICE_MODEL}

  google {
    api-key = ${?GOOGLE_API_KEY}
    base-url = "https://generativelanguage.googleapis.com"
    models {
      lite = "gemini-2.0-flash-lite"
      flash = "gemini-2.0-flash"
      pro = "gemini-2.5-pro"
      # all = "xxx"  # overrides lite/flash/pro if set
    }
  }
  deep-seek {
    api-key = ${?DEEP_SEEK_API_KEY}
    base-url = "https://api.deepseek.com"
    models {
      lite = "deepseek-chat"
      flash = "deepseek-chat"
      pro = "deepseek-chat"
    }
  }
  minimax {
    api-key = ${?MINIMAX_CODING_PLAN_KEY}
    base-url = "https://api.minimaxi.com"
    models {
      lite = "MiniMax-M2.5"
      flash = "MiniMax-M2.5"
      pro = "MiniMax-M2.7"
    }
  }
}

# Embedding 配置
embedding {
  api-key = ${?EMBEDDING_API_KEY}
  provider = "bytedance"
}

# Search 配置
search {
  api-key = ${?SEARCH_API_KEY}
  provider = "exa"
}

# Browser 相关配置
browser {
  playwright-host = ${?PLAYWRIGHT_HOST}
}

# 代理配置
proxy {
  http = ${?HTTP_PROXY}
  socks = ${?SOCKS_PROXY}
}

