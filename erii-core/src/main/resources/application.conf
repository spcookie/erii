# LLM 配置
llm {
  choice-provider = "NONE"

  google {
    api-key = ${?GOOGLE_API_KEY}
    base-url = "https://generativelanguage.googleapis.com"
    models {
      lite = "gemini-2.0-flash-lite"
      flash = "gemini-2.0-flash"
      pro = "gemini-2.5-pro"
      # all = "xxx"  # overrides lite/flash/pro if set
    }
  }
  deep-seek {
    api-key = ${?DEEP_SEEK_API_KEY}
    base-url = "https://api.deepseek.com"
    models {
      lite = "deepseek-chat"
      flash = "deepseek-chat"
      pro = "deepseek-chat"
    }
  }
  minimax {
    api-key = ${?MINIMAX_CODING_PLAN_KEY}
    base-url = "https://api.minimaxi.com"
    models {
      lite = "MiniMax-M2.5"
      flash = "MiniMax-M2.5"
      pro = "MiniMax-M2.7"
    }
  }
  openai {
    api-key = ${?OPENAI_API_KEY}
    base-url = "https://api.openai.com/v1"
    models {
      lite = "gpt-4.1-nano"
      flash = "gpt-4.1-mini"
      pro = "gpt-4.1"
    }
  }
  anthropic {
    api-key = ${?ANTHROPIC_API_KEY}
    base-url = "https://api.anthropic.com"
    models {
      lite = "claude-haiku-4-5-20251001"
      flash = "claude-sonnet-4-6"
      pro = "claude-sonnet-4-6"
    }
  }
  openrouter {
    api-key = ${?OPENROUTER_API_KEY}
    base-url = "https://openrouter.ai/api"
    models {
      lite = "openai/gpt-4.1-nano"
      flash = "openai/gpt-4.1-mini"
      pro = "anthropic/claude-sonnet-4-6"
    }
  }
}

# Embedding 配置
embedding {
  api-key = ${?EMBEDDING_API_KEY}
  provider = "bytedance"
  model = "doubao-embedding-vision-250615"
}

# Search 配置
search {
  api-key = ${?SEARCH_API_KEY}
  provider = "exa"
}

# Browser 相关配置
browser {
  download = false
  playwright-url = ${?PLAYWRIGHT_URL}
  external-url = ${?EXTERNAL_URL}
}

# 代理配置
proxy {
  http = ${?HTTP_PROXY}
  socks = ${?SOCKS_PROXY}
}
