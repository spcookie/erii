# LLM 配置
llm {
  choice-provider = "NONE"

  capability {
    completion = true
    prompt-caching = true
    temperature = true
    tools = true
    tool-choice = true
    multiple-choices = true
    thinking = true
    vision-image = true

    lite {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = false
      vision-image = false
    }
    flash {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
    pro {
      completion = true
      prompt-caching = true
      temperature = true
      tools = true
      tool-choice = true
      multiple-choices = true
      thinking = true
      vision-image = true
    }
  }

  param {
    lite {
    }
    flash {
    }
    pro {
    }
  }

  providers {
    google {
      api-key = ${?GOOGLE_API_KEY}
      base-url = "https://generativelanguage.googleapis.com"
      models {
        lite = "gemini-2.0-flash-lite"
        flash = "gemini-2.0-flash"
        pro = "gemini-2.5-pro"
        # all = "xxx"  # overrides lite/flash/pro if set
      }
    }
    openai {
      api-key = ${?OPENAI_API_KEY}
      base-url = "https://api.openai.com/v1"
      models {
        lite = "gpt-4.1-nano"
        flash = "gpt-4.1-mini"
        pro = "gpt-4.1"
      }
    }
    anthropic {
      api-key = ${?ANTHROPIC_API_KEY}
      base-url = "https://api.anthropic.com"
      models {
        lite = "claude-haiku-4-5-20251001"
        flash = "claude-sonnet-4-6"
        pro = "claude-sonnet-4-6"
      }
    }
    openrouter {
      api-key = ${?OPENROUTER_API_KEY}
      base-url = "https://openrouter.ai/api"
      models {
        lite = "openai/gpt-4.1-nano"
        flash = "openai/gpt-4.1-mini"
        pro = "anthropic/claude-sonnet-4-6"
      }
    }
  }
}

# Embedding 配置
embedding {
  api-key = ${?EMBEDDING_API_KEY}
  provider = "bytedance"
  model = "doubao-embedding-vision-250615"
}

# Search 配置
search {
  api-key = ${?SEARCH_API_KEY}
  provider = "exa"
}

# Browser 相关配置
browser {
  download = false
  playwright-url = ${?PLAYWRIGHT_URL}
  external-host = ${?EXTERNAL_HOST}
}

# 代理配置
proxy {
  http = ${?HTTP_PROXY}
  socks = ${?SOCKS_PROXY}
}

# State tuning
state-tuning {
  emotion {
    emotion-retention-high = 0.85
    emotion-retention-medium = 0.7
    emotion-retention-low = 0.5
    mood-retention = 0.92
    mood-emotion-influence = 0.5
    emotion-half-life-seconds = 600
    mood-half-life-seconds = 3600
  }

  flow {
    min-ratio-of-desire = 0.3
    min-value-min = 1.0
    min-value-max = 20.0
    decay-normal-per-minute = 0.3
    decay-negative-per-minute = 1.5
    core-interest-base-charge = 20.0
    continuous-interaction-base-charge = 10.0
    deep-reply-base-charge = 5.0
    group-resonance-base-charge = 10.0
    negative-penalty = 40.0
    topic-interrupt-penalty = 30.0
    repeat-topic-penalty = 10.0
    low-activity-penalty = 5.0
    getting-better-threshold = 30.0
    burst-threshold = 70.0
  }

  volition {
    base-desire-default = 15.0
    keyword-hit-max-stimulus = 30.0
    busy-group-stimulus = 10.0
    indirect-mention-stimulus = 25.0
    emotional-resonance-stimulus = 15.0
    reset-stimulus-amount = 15.0
    fatigue-on-speak = 40.0
    fatigue-decay-low-arousal = 2.0
    fatigue-decay-normal = 1.0
    stimulus-decay-normal = 3.0
    stimulus-decay-high-flow = 1.0
    normal-speak-threshold = 65.0
    high-flow-speak-threshold = 50.0
    high-flow-threshold = 70.0
    arousal-impulse-weight = 30.0
    negative-pleasure-penalty-weight = 20.0
    flow-bonus-start = 70.0
    flow-bonus-weight = 1.0
  }

  memory {
    batch-limit = 400
    min-messages = 30
  }

  summary {
    batch-limit = 200
    min-messages = 30
    retention-days = 7
  }

  meme {
    analyze-threshold = 3
    max-contexts = 400
    cleanup-days = 7
    low-heat-seen-threshold = 3
  }

  evolution {
    default-weight = 50
    active-weight-threshold = 50
    min-weight-threshold = 20
    increase-on-use = 10
    decay-per-cycle = 10
    decrease-on-negative = 50
    stale-days = 3
    recent-range-hours = 1
    recent-message-limit = 500
    active-limit = 10
  }
}
