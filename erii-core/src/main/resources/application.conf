app {
  # LLM 配置
  llm {
    google-api-key = ${GOOGLE_API_KEY}
    google-base-url = ${GOOGLE_BASE_URL}
    deep-seek-api-key = ${DEEP_SEEK_API_KEY}
    deep-seek-base-url = ${DEEP_SEEK_BASE_URL}
    minimax-coding-plan-key = ${MINIMAX_CODING_PLAN_KEY}
    minimax-base-url = ${MINIMAX_BASE_URL}
    choice-model = ${CHOICE_MODEL}
  }

  # Embedding 配置
  embedding {
    api-key = ${VOLCENGINE_API_KEY}
  }

  # Exa 搜索配置
  exa {
    api-key = ${EXA_API_KEY}
  }

  # 代理配置
  proxy {
    http = ${HTTP_PROXY}
    socks = ${SOCKS_PROXY}
  }

  # NapCat QQ Bot 配置（支持多个机器人）
  napcat {
    # 多个 bot 配置，key 为 bot 标识符
    bots = {
      erii = {
        ws = ${NAPCAT_WS}
        token = ${NAPCAT_TOKEN}
        role-id = "erii"
      }
    }
  }

  # Web 相关配置
  web {
    search-host = ${WEB_SEARCH_HOST}
    playwright-host = ${PLAYWRIGHT_HOST}
    playwright-skip-browser-download = ${PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD}
  }

  # 群组配置
  groups {
    debug-group-id = ${DEBUG_GROUP_ID}
    enable-groups = ${ENABLE_GROUPS}
    message-redirect-map = ${MESSAGE_REDIRECT_MAP}
  }
}

# 插件配置 - 按插件名称隔离
plugins {
  # 语音插件
  Speech {
    minimax-api-key = ${MINIMAX_API_KEY}
  }

  # 网易云音乐插件
  NetEaseMusic {
    api-base = ${NETEASE_MUSIC_API_BASE}
  }

  # Steam 插件
  SteamWatcher {
    api-key = ${STEAM_API_KEY}
    subscriptions = ${STEAM_SUBSCRIPTIONS}
  }

  # 图片插件
  ImageClient {
    google-api-key = ${GOOGLE_API_KEY}
  }
}
