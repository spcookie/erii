<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>群组状态监控 - Erii Bot</title>
    <link href="/styles.css?v=19" rel="stylesheet">
    <link href="/css/fontawesome.min.css?v=3" rel="stylesheet">
    <style>
        .status-detail {
            padding: 0;
        }
    </style>
    <script src="/js/htmx.min.js?v=1"></script>
</head>
<body>
<div class="container">
    <section class="status-detail" id="group-status-detail">
        <div class="empty-state">
            <div class="empty-icon-wrapper">
                <i class="fas fa-spinner fa-spin empty-icon"></i>
            </div>
            <h3 class="empty-title">加载中</h3>
            <p class="empty-description">正在获取群组状态数据...</p>
        </div>
    </section>
</div>

<script>
    // 情绪枚举映射表
    const EMOTION_MAP = {
        'JOY': {name: '喜悦', pad: {pleasure: 2.77, arousal: 1.21, dominance: 1.42}, desc: '充满欢乐与活力的状态'},
        'OPTIMISM': {name: '乐观', pad: {pleasure: 2.48, arousal: 1.05, dominance: 1.75}, desc: '对未来持积极态度'},
        'RELAXATION': {
            name: '轻松',
            pad: {pleasure: 2.19, arousal: -0.66, dominance: 1.05},
            desc: '平和舒适的放松状态'
        },
        'SURPRISE': {name: '惊奇', pad: {pleasure: 1.72, arousal: 1.71, dominance: 0.22}, desc: '对意外事件的反应'},
        'MILDNESS': {name: '温和', pad: {pleasure: 1.57, arousal: -0.79, dominance: 0.38}, desc: '温柔平静的情绪'},
        'DEPENDENCE': {
            name: '依赖',
            pad: {pleasure: 0.39, arousal: -0.81, dominance: 1.48},
            desc: '需要他人支持的状态'
        },
        'BOREDOM': {name: '无聊', pad: {pleasure: -0.53, arousal: -1.25, dominance: -0.84}, desc: '缺乏兴趣与刺激'},
        'SADNESS': {name: '悲伤', pad: {pleasure: -0.89, arousal: 0.17, dominance: -0.70}, desc: '消极低落的情绪'},
        'FEAR': {name: '恐惧', pad: {pleasure: -0.93, arousal: 1.30, dominance: -0.64}, desc: '对威胁的警觉反应'},
        'ANXIETY': {name: '焦虑', pad: {pleasure: -0.95, arousal: 0.32, dominance: -0.63}, desc: '不安与担忧的状态'},
        'CONTEMPT': {name: '藐视', pad: {pleasure: -1.58, arousal: 0.32, dominance: 1.02}, desc: '轻视与不屑的态度'},
        'DISGUST': {name: '厌恶', pad: {pleasure: -1.80, arousal: 0.40, dominance: 0.67}, desc: '强烈的排斥感'},
        'RESENTMENT': {name: '愤懑', pad: {pleasure: -1.98, arousal: 1.10, dominance: 0.60}, desc: '压抑的愤怒与不满'},
        'HOSTILITY': {name: '敌意', pad: {pleasure: -2.08, arousal: 1.00, dominance: 1.12}, desc: '对抗性的负面情绪'}
    };

    const TONE_MAP = {
        'FRIENDLY': '友好',
        'GENTLE': '温柔',
        'NEUTRAL': '中性',
        'IRONIC': '讽刺',
        'LOW_ENERGY': '低能量'
    };

    const AGGRESSION_MAP = {
        'NONE': '无攻击性',
        'ABSTRACT_SARCASM': '抽象讽刺',
        'TEASING': '戏弄'
    };

    const EMOJI_MAP = {
        'NONE': '无表情',
        'LOW': '少量表情',
        'MEDIUM': '适度表情',
        'HIGH': '丰富表情'
    };

    // 从 URL 中提取 botId 和 groupId
    function parseUrlPath() {
        const path = window.location.pathname;
        const match = path.match(/^\/view\/([^/]+)\/([^/]+)$/);
        if (match) {
            return {botId: match[1], groupId: match[2]};
        }
        return null;
    }

    // 加载群组状态
    async function loadGroupStatus() {
        const params = parseUrlPath();
        if (!params) {
            showError('URL 格式错误，请使用 /view/botId/groupId 格式访问');
            return;
        }

        try {
            const response = await fetch(`/status/${params.botId}`);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const groupStatus = data.status.find(g => g.groupId === params.groupId);

            if (!groupStatus) {
                showError(`未找到群组 ${params.groupId} 的状态数据`);
                return;
            }

            renderGroupStatus(groupStatus, params, data.pluginStats, data.name);
        } catch (error) {
            showError(`加载失败: ${error.message}`);
        }
    }

    function showError(message) {
        const container = document.getElementById('group-status-detail');
        container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon-wrapper">
                        <i class="fas fa-exclamation-triangle empty-icon" style="color: hsl(var(--destructive));"></i>
                    </div>
                    <h3 class="empty-title">加载失败</h3>
                    <p class="empty-description">${message}</p>
                </div>
            `;
    }

    function renderGroupStatus(groupStatus, params, pluginStats, botName) {
        const container = document.getElementById('group-status-detail');
        const bp = groupStatus.behaviorProfile;
        const pad = groupStatus.pad;
        const flow = groupStatus.flowState;
        const volition = groupStatus.volitionState;

        container.innerHTML = `
                <article class="blog-article">
                    <header class="article-header">
                        <div class="article-meta-bar">
                            <div class="meta-left">
                                <span class="meta-badge bot-id">
                                    <i class="fas fa-robot"></i>
                                    <span>${botName} (${params.botId})</span>
                                </span>
                                <span class="meta-badge timestamp">
                                    <i class="fas fa-users"></i>
                                    <span>群组 ${groupStatus.groupId}</span>
                                </span>
                                <span class="meta-badge timestamp">
                                    <i class="far fa-clock"></i>
                                    <span>${new Date().toLocaleString('zh-CN', {
            month: 'numeric',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        })}</span>
                                </span>
                            </div>
                        </div>
                    </header>

                    <div class="article-content">
                        <section class="markdown-section">
                            <h3 class="subsection-title">
                                <i class="fas fa-puzzle-piece"></i> 插件
                            </h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-puzzle-piece"></i>
                                        <span>Extensions</span>
                                    </div>
                                    <div class="stat-value">${pluginStats.totalExtensions}</div>
                                    <div class="stat-desc">个扩展总数</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-cubes"></i>
                                        <span>Plugins</span>
                                    </div>
                                    <div class="stat-value">${pluginStats.plugins.length}</div>
                                    <div class="stat-desc">个已加载插件</div>
                                </div>
                            </div>

                            ${bp ? `
                            <h3 class="subsection-title">
                                <i class="fas fa-smile"></i> 情绪状态
                            </h3>
                            ${renderBehaviorProfile(bp, pad)}
                            ` : '<blockquote class="info-box"><i class="fas fa-exclamation-triangle"></i> 暂无情绪数据</blockquote>'}

                            <h3 class="subsection-title">
                                <i class="fas fa-water"></i> 心流投入度
                            </h3>
                            ${renderFlowState(flow)}

                            <h3 class="subsection-title">
                                <i class="fas fa-brain"></i> 冲动值
                            </h3>
                            ${renderVolitionState(volition)}

                            <h3 class="subsection-title">
                                <i class="fas fa-database"></i> 记忆
                            </h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-file-alt"></i>
                                        <span>Facts</span>
                                    </div>
                                    <div class="stat-value">${groupStatus.factSize}</div>
                                    <div class="stat-desc">条事实记忆</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-user"></i>
                                        <span>UserProfile</span>
                                    </div>
                                    <div class="stat-value">${groupStatus.userProfileSize}</div>
                                    <div class="stat-desc">个用户档案</div>
                                </div>
                            </div>

                            <h3 class="subsection-title">
                                <i class="fas fa-images"></i> 表情包 & 词汇
                            </h3>
                            <div class="stats-grid">
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-images"></i>
                                        <span>Memes</span>
                                    </div>
                                    <div class="stat-value">${groupStatus.memeSize}</div>
                                    <div class="stat-desc">个表情包（${groupStatus.analyzedMemeSize} 已分析）</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">
                                        <i class="fas fa-language"></i>
                                        <span>Vocabulary</span>
                                    </div>
                                    <div class="stat-value">${groupStatus.vocabularies ? groupStatus.vocabularies.length : 0}</div>
                                    <div class="stat-desc">个学习词汇</div>
                                </div>
                            </div>

                            ${groupStatus.summary ? `
                            <h3 class="subsection-title">
                                <i class="fas fa-book-open"></i> 会话摘要
                            </h3>
                            <div class="summary-container">
                                <div class="summary-content">
                                    <i class="fas fa-quote-left"></i>
                                    <div class="summary-text">${groupStatus.summary}</div>
                                </div>
                            </div>
                            ` : ''}
                        </section>
                    </div>

                    <footer style="padding: 0 0 1rem 0; -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);">
                        <div style="display: flex; gap: 4px; height: 6px; margin-bottom: 8px;">
                            <div style="flex: 3; background: #6366f1; border-radius: 3px;"></div>
                            <div style="flex: 2; background: #8b5cf6; border-radius: 3px;"></div>
                            <div style="flex: 1; background: #a78bfa; border-radius: 3px;"></div>
                            <div style="flex: 2; background: #c084fc; border-radius: 3px;"></div>
                            <div style="flex: 1; background: #e879f9; border-radius: 3px;"></div>
                            <div style="flex: 3; background: #f472b6; border-radius: 3px;"></div>
                            <div style="flex: 1; background: #fb923c; border-radius: 3px;"></div>
                            <div style="flex: 2; background: #fbbf24; border-radius: 3px;"></div>
                        </div>
                        <div style="display: flex; gap: 4px; height: 32px;">
                            <div style="flex: 2; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 6px; opacity: 0.9;"></div>
                            <div style="flex: 1; background: linear-gradient(135deg, #a78bfa, #c084fc); border-radius: 6px; opacity: 0.7;"></div>
                            <div style="flex: 3; background: linear-gradient(135deg, #818cf8, #6366f1); border-radius: 6px; opacity: 0.15;"></div>
                            <div style="flex: 1; background: linear-gradient(135deg, #e879f9, #f472b6); border-radius: 6px; opacity: 0.5;"></div>
                            <div style="flex: 2; background: linear-gradient(135deg, #f472b6, #fb923c); border-radius: 6px; opacity: 0.3;"></div>
                        </div>
                        <div style="display: flex; gap: 4px; height: 4px; margin-top: 4px;">
                            <div style="flex: 1; background: #fbbf24; border-radius: 2px; opacity: 0.6;"></div>
                            <div style="flex: 4; background: #6366f1; border-radius: 2px; opacity: 0.2;"></div>
                            <div style="flex: 2; background: #e879f9; border-radius: 2px; opacity: 0.4;"></div>
                            <div style="flex: 1; background: #34d399; border-radius: 2px; opacity: 0.5;"></div>
                            <div style="flex: 3; background: #8b5cf6; border-radius: 2px; opacity: 0.15;"></div>
                        </div>
                    </footer>
                </article>
            `;
    }

    function renderBehaviorProfile(bp, pad) {
        const emotionData = EMOTION_MAP[bp.emotion] || {
            name: bp.emotion,
            pad: {pleasure: 0, arousal: 0, dominance: 0},
            desc: '未知情绪状态'
        };

        const normalizeForDisplay = (val) => {
            return Math.max(0, Math.min(100, (val + 4) / 8 * 100));
        };

        const getEmotionTendency = (p, a, d) => {
            if (p > 1) return '积极愉悦';
            if (p < -1) return '消极低落';
            return '情绪平和';
        };

        return `
                <div class="emotion-container">
                    <div class="emotion-header">
                        <div class="emotion-current">
                            <span class="emotion-name">${emotionData.name}</span>
                            <span class="emotion-code">${bp.emotion}</span>
                        </div>
                        <div class="emotion-tendency">${getEmotionTendency(pad.p, pad.a, pad.d)}</div>
                    </div>
                    
                    <div class="emotion-description">
                        <i class="fas fa-quote-left"></i>
                        ${emotionData.desc}
                    </div>
                    
                    <div class="pad-grid">
                        <div class="pad-item">
                            <div class="pad-header">
                                <div class="pad-label">
                                    <i class="fas fa-smile"></i>
                                    <span>Pleasure</span>
                                </div>
                                <div class="pad-value">${pad.p.toFixed(2)}</div>
                            </div>
                            <div class="pad-bar-wrapper">
                                <div class="pad-bar pleasure" style="width: ${normalizeForDisplay(pad.p)}%"></div>
                            </div>
                            <div class="pad-scale">
                                <span>-4</span>
                                <span class="scale-center">0</span>
                                <span>+4</span>
                            </div>
                        </div>
                        
                        <div class="pad-item">
                            <div class="pad-header">
                                <div class="pad-label">
                                    <i class="fas fa-bolt"></i>
                                    <span>Arousal</span>
                                </div>
                                <div class="pad-value">${pad.a.toFixed(2)}</div>
                            </div>
                            <div class="pad-bar-wrapper">
                                <div class="pad-bar arousal" style="width: ${normalizeForDisplay(pad.a)}%"></div>
                            </div>
                            <div class="pad-scale">
                                <span>-4</span>
                                <span class="scale-center">0</span>
                                <span>+4</span>
                            </div>
                        </div>
                        
                        <div class="pad-item">
                            <div class="pad-header">
                                <div class="pad-label">
                                    <i class="fas fa-crown"></i>
                                    <span>Dominance</span>
                                </div>
                                <div class="pad-value">${pad.d.toFixed(2)}</div>
                            </div>
                            <div class="pad-bar-wrapper">
                                <div class="pad-bar dominance" style="width: ${normalizeForDisplay(pad.d)}%"></div>
                            </div>
                            <div class="pad-scale">
                                <span>-4</span>
                                <span class="scale-center">0</span>
                                <span>+4</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="behavior-profile">
                        <div class="profile-label">行为特征</div>
                        <div class="profile-tags">
                            <span class="profile-tag">
                                <i class="fas fa-comment-dots"></i>
                                ${TONE_MAP[bp.tone] || bp.tone}
                            </span>
                            <span class="profile-tag">
                                <i class="fas fa-hand-rock"></i>
                                ${AGGRESSION_MAP[bp.aggressiveness] || bp.aggressiveness}
                            </span>
                            <span class="profile-tag">
                                <i class="fas fa-icons"></i>
                                ${EMOJI_MAP[bp.emojiLevel] || bp.emojiLevel}
                            </span>
                        </div>
                    </div>
                </div>
            `;
    }

    function renderFlowState(flow) {
        const stateColors = {
            'STANDBY': '#71717a',
            'GETTING_BETTER': '#3b82f6',
            'FLOW_BURST': '#ef4444'
        };
        const stateNames = {
            'STANDBY': '待机模式',
            'GETTING_BETTER': '渐入佳境',
            'FLOW_BURST': '心流爆发'
        };
        const stateIcons = {
            'STANDBY': 'fa-circle',
            'GETTING_BETTER': 'fa-circle-half-stroke',
            'FLOW_BURST': 'fa-circle-dot'
        };

        return `
                <div class="flow-state-container">
                    <div class="flow-header">
                        <div class="flow-current-state" style="color: ${stateColors[flow.state]}">
                            <i class="fas ${stateIcons[flow.state]}"></i>
                            <span class="state-name">${stateNames[flow.state]}</span>
                        </div>
                        <div class="flow-meter-value">${flow.meter.toFixed(1)}</div>
                    </div>
                    
                    <div class="flow-bar-wrapper">
                        <div class="flow-bar" style="width: ${flow.meter}%; background: ${stateColors[flow.state]}"></div>
                        <div class="flow-marker" style="left: 30%" data-label="30"></div>
                        <div class="flow-marker" style="left: 70%" data-label="70"></div>
                    </div>
                    
                    <div class="flow-scale">
                        <span class="scale-point">
                            <span class="scale-value">0</span>
                            <span class="scale-label">待机</span>
                        </span>
                        <span class="scale-point">
                            <span class="scale-value">30</span>
                            <span class="scale-label">阈值</span>
                        </span>
                        <span class="scale-point">
                            <span class="scale-value">70</span>
                            <span class="scale-label">阈值</span>
                        </span>
                        <span class="scale-point">
                            <span class="scale-value">100</span>
                            <span class="scale-label">爆发</span>
                        </span>
                    </div>
                    
                </div>
            `;
    }

    function renderVolitionState(volition) {
        const shouldSpeakClass = volition.shouldSpeak ? 'active' : 'inactive';
        const speakStatus = volition.shouldSpeak ? '已触发主动发言阈值' : '保持观察状态';
        const speakIcon = volition.shouldSpeak ? 'fa-circle-check' : 'fa-circle-pause';

        return `
                <div class="volition-container">
                    <div class="volition-header">
                        <div class="volition-title">
                            <i class="fas fa-brain"></i>
                            <span>冲动值累积</span>
                        </div>
                        <div class="volition-status ${shouldSpeakClass}">
                            <i class="fas ${speakIcon}"></i>
                            <span>${speakStatus}</span>
                        </div>
                    </div>
                    
                    <div class="volition-metrics">
                        <div class="volition-metric">
                            <div class="metric-header">
                                <div class="metric-label">
                                    <i class="fas fa-bolt"></i>
                                    <span>Stimulus</span>
                                </div>
                                <div class="metric-value">${volition.stimulus.toFixed(1)}</div>
                            </div>
                            <div class="metric-bar-wrapper">
                                <div class="metric-bar stimulus" style="width: ${volition.stimulus}%"></div>
                            </div>
                            <div class="metric-scale">
                                <span>0</span>
                                <span class="scale-center">50</span>
                                <span>100</span>
                            </div>
                        </div>
                        
                        <div class="volition-metric">
                            <div class="metric-header">
                                <div class="metric-label">
                                    <i class="fas fa-bed"></i>
                                    <span>Fatigue</span>
                                </div>
                                <div class="metric-value">${volition.fatigue.toFixed(1)}</div>
                            </div>
                            <div class="metric-bar-wrapper">
                                <div class="metric-bar fatigue" style="width: ${volition.fatigue}%"></div>
                            </div>
                            <div class="metric-scale">
                                <span>0</span>
                                <span class="scale-center">50</span>
                                <span>100</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
    }

    // 页面加载时自动获取数据
    document.addEventListener('DOMContentLoaded', loadGroupStatus);
</script>
</body>
</html>
