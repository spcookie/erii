<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Bot · Status</title>
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/fonts.css" rel="stylesheet">
</head>
<body>

<div class="page">

    <header class="header">
        <div class="label">Bot · Group Status Monitor</div>
        <h1 class="title">Erii 机器人状态监控</h1>
    </header>

    <section class="panel"
             hx-get="/bots"
             hx-swap="innerHTML"
             hx-target="#bot-list"
             hx-trigger="load, every 30s">
        <div class="panel-head">
            <span class="panel-num">01</span>
            <span>在线机器人</span>
        </div>
        <div class="bot-list" id="bot-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </section>

    <section class="panel" id="status-detail">
        <div class="empty-state">
            <div class="empty-icon-wrap">
                <i data-lucide="bot"></i>
            </div>
            <h3 class="empty-title">选择一个机器人</h3>
            <p class="empty-desc">从上方列表中选择一个在线机器人，查看实时状态详情</p>
            <div class="empty-hint">
                <i data-lucide="arrow-up"></i>
                <span>点击上方机器人卡片</span>
            </div>
        </div>
    </section>

    <div class="end-rule"></div>
    <div class="end-note">Bot · Status Monitor</div>

</div>

<script src="/js/htmx.min.js"></script>
<script src="/js/lucide.min.js"></script>
<script src="/js/app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
