<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Erii 机器人状态监控</title>
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/fontawesome.min.css" rel="stylesheet">
    <script src="/js/htmx.min.js"></script>
    <script src="/js/app.js"></script>
</head>
<body>
<!-- 主容器 -->
<div class="container">
    <!-- 机器人选择区 -->
    <section class="bot-selector"
             hx-get="/bots"
             hx-swap="innerHTML"
             hx-target="#bot-list"
             hx-trigger="load, every 30s">
        <div class="section-header">
            <h2><i class="fas fa-robot"></i> 在线机器人</h2>
        </div>
        <div class="bot-list" id="bot-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </section>

    <!-- 状态详情区 -->
    <section class="status-detail" id="status-detail">
        <div class="empty-state">
            <div class="empty-icon-wrapper">
                <i class="fas fa-robot empty-icon"></i>
            </div>
            <h3 class="empty-title">请选择一个机器人</h3>
            <p class="empty-description">从上方列表中选择一个在线机器人查看实时状态详情</p>
            <div class="empty-hint">
                <i class="fas fa-arrow-up"></i>
                <span>点击上方机器人卡片开始</span>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="footer-tech-stack">
            <span class="tech-item">Power by</span>
            <i class="fas fa-heart" style="color: #ef4444; margin: 0 4px;"></i>
            <span class="tech-item">Kotlin</span>
            <span class="tech-separator">|</span>
            <span class="tech-item">Ktor</span>
            <span class="tech-separator">|</span>
            <span class="tech-item">Koin</span>
            <span class="tech-separator">|</span>
            <span class="tech-item">Exposed</span>
            <span class="tech-separator">|</span>
            <span class="tech-item">Koog</span>
            <span class="tech-separator">|</span>
            <span class="tech-item">JobRunr</span>
        </div>
        <div class="footer-copyright">
            <i class="far fa-copyright"></i>
            <span>2026 Erii. All rights reserved.</span>
        </div>
    </footer>
</div>
</body>
</html>
