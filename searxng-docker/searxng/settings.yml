# see https://docs.searxng.org/admin/settings/settings.html#settings-use-default-settings
use_default_settings: true

engines:
  - name: baidu
    engine: baidu
    disabled: false
  - name: quark
    engine: quark
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: google
    engine: google
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: startpage
    engine: startpage
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0

  proxies:
    all://:
      - http://hostmachine:7899
      - socks5://hostmachine:7898

  extra_proxy_timeout: 10

server:
  # base_url is defined in the SEARXNG_BASE_URL environment variable, see .env and docker-compose.yml
  secret_key: "!@#$%^&*90"  # change this!
  limiter: false  # enable this when running the instance for a public usage on the internet
  image_proxy: true
redis:
  url: redis://redis:6379/0
search:
  formats:
    - html
    - json