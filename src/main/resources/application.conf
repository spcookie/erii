app {
  # LLM 配置
  llm {
    google-api-key = ""
    google-base-url = ""
    deep-seek-api-key = ""
    deep-seek-base-url = ""
    minimax-coding-plan-key = ""
    minimax-base-url = ""
    choice-model = "GOOGLE"
  }

  # Embedding 配置
  embedding {
    api-key = ""
  }

  # Exa 搜索配置
  exa {
    api-key = ""
  }

  # 代理配置
  proxy {
    http = ""
    socks = ""
  }

  # NapCat QQ Bot 配置
  napcat {
    ws = "ws://127.0.0.1:3001"
    token = ""
  }

  # Web 相关配置
  web {
    search-host = "http://127.0.0.1:18080"
    playwright-host = "ws://127.0.0.1:13001"
    playwright-skip-browser-download = true
  }

  # 群组配置
  groups {
    debug-group-id = ""
    enable-groups = []
    message-redirect-map = {}
  }
}

# 插件配置 - 按插件名称隔离
plugins {
  # 语音插件
  Speech {
    minimax-api-key = ""
  }

  # 网易云音乐插件
  NetEaseMusic {
    api-base = "http://127.0.0.1:13000"
  }

  # Steam 插件
  SteamWatcher {
    api-key = ""
    subscriptions = ""
  }

  # 图片插件
  ImageClient {
    google-api-key = ""
  }
}
